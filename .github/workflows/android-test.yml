name: Google Play Console Deploy - Android Test

on:
  push:
    branches: [ develop ]

jobs:
  build-android-test:
    timeout-minutes: 30
    name: Google Play Console Deploy - Android Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Decode and create .env file (test)
        run: |
          echo "${{ secrets.ENV_TEST_B64 }}" | base64 --decode > .env

      - name: Cache Flutter pub packages
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-stable-3.27.1-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-stable-3.27.1-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          architecture: x64
          cache: true

      - name: Decode google-services.json
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > ./android/app/google-services.json

      - name: Decode firebase_options.dart
        run: |
          mkdir -p lib
          echo "${{ secrets.FIREBASE_OPTIONS_B64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Create android/local.properties (CI)
        run: |
          mkdir -p android
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}" >> android/local.properties
          cat android/local.properties | sed 's/KAKAO_NATIVE_APP_KEY=.*/KAKAO_NATIVE_APP_KEY=***REDACTED***/'

      - name: Verify decoded files
        run: |
          test -f lib/firebase_options.dart || (echo "missing lib/firebase_options.dart" && exit 1)
          test -f .env || (echo "missing .env" && exit 1)

      - name: Decode and install signing key
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/app/keystore/my-release-key.jks
          echo "storeFile=keystore/my-release-key.jks" > android/app/keystore/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/app/keystore/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/app/keystore/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/app/keystore/key.properties

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings || echo "Analysis completed with warnings"
        continue-on-error: false

      - name: Auto-increment build number
        run: |
          BUILD_NO=$(date +%s)
          echo "BUILD_NO=$BUILD_NO" >> $GITHUB_ENV

      - name: Build Flutter Android App Bundle
        run: flutter build appbundle --release --build-number=$BUILD_NO

      - name: Upload app to Google Play (Internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.dongsoop.site.dongsoop
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Extract build date (KST)
        run: |
          TZ=Asia/Seoul date +"%Y-%m-%d %H:%M" > .build_date
          echo "BUILD_DATE=$(cat .build_date)" >> $GITHUB_ENV

      - name: Build Success Summary
        run: |
          echo "🎉 Flutter Android test build completed successfully!"
          echo "📦 App Bundle uploaded to Google Play Internal track"
          echo "🔗 Build #${{ github.run_number }}"
          echo "🗓️ Date (KST): $BUILD_DATE"

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.APPLE_BUILD_DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"🧪 [Internal] Android 테스트 빌드가 업로드되었습니다! (테스트 광고 적용) 🗓️ 날짜(KST): $BUILD_DATE\"}" \
            $DISCORD_WEBHOOK
