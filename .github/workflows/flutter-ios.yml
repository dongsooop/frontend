name: Flutter iOS CI/CD

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-ios:
    timeout-minutes: 30
    name: Build Flutter iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Flutter pub packages
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-stable-3.27.1-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-stable-3.27.1-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          architecture: x64
          cache: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Decode and create .env file (test)
        run: |
          echo "${{ secrets.ENV_TEST_B64 }}" | base64 --decode > .env

      - name: Decode Secrets.xcconfig
        run: |
          mkdir -p ios/Flutter
          echo "${{ secrets.SECRETS_XCCONFIG_B64 }}" | base64 --decode > ios/Flutter/Secrets.xcconfig

      - name: Decode GoogleService-Info.plist
        run: |
          mkdir -p ios/Runner
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ./ios/Runner/GoogleService-Info.plist

      - name: Decode firebase_options.dart
        run: |
          mkdir -p lib
          echo "${{ secrets.FIREBASE_OPTIONS_B64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Verify decoded files
        run: |
          test -f lib/firebase_options.dart || (echo "missing lib/firebase_options.dart" && exit 1)
          test -s .env || (echo ".env is empty — ENV_TEST_B64 secret may not be set" && exit 1)
          grep -q 'BASE_URL' .env || (echo "BASE_URL missing from .env" && exit 1)

      - name: Cache iOS Pods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: iospods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: iospods-${{ runner.os }}-

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get
          cd ios && pod install --repo-update

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings || echo "Analysis completed with warnings"
        continue-on-error: false

      # PR: 코드사인 없이 빌드만 (빠른 CI 검증)
      - name: Build iOS (no codesign) - PR only
        if: github.event_name == 'pull_request'
        run: |
          flutter build ios --release --no-codesign
          echo "iOS build completed successfully!"

      - name: Upload iOS App as Artifact - PR only
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dongsoop-ios-app-${{ github.run_number }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      # Push to develop: 코드사인 + TestFlight 업로드 (테스트 광고)
      - name: Decode certificates/profiles - push only
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_P12 }}" | base64 --decode > ios_distribution.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision

      - name: Import certificate to keychain - push only
        if: github.event_name == 'push'
        run: |
          security create-keychain -p "${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}" build.keychain || true
          security import ios_distribution.p12 -k build.keychain -P "${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security unlock-keychain -p "${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}" build.keychain

      - name: Install provisioning profile - push only
        if: github.event_name == 'push'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Auto-increment build number - push only
        if: github.event_name == 'push'
        run: |
          BUILD_NO=$(date +%s)
          echo "BUILD_NO=$BUILD_NO" >> $GITHUB_ENV

      - name: Build Flutter iOS IPA - push only
        if: github.event_name == 'push'
        run: flutter build ipa --release --build-number=$BUILD_NO --export-options-plist=ios/ExportOptions_AppStore.plist

      - name: Upload app to TestFlight - push only
        if: github.event_name == 'push'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ github.workspace }}/build/ios/ipa/dongsoop.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Send Discord Notification - push only
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK: ${{ secrets.APPLE_BUILD_DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"🧪 [TestFlight] iOS 테스트 빌드가 업로드되었습니다! (테스트 광고 적용)\"}" \
            $DISCORD_WEBHOOK
